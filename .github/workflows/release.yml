name: Release Desktop Builds

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac-linux:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
            artifacts: client/release/*.dmg
          - os: ubuntu-latest
            script: dist:linux
            artifacts: client/release/*.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: client
      - name: Build
        run: npm run ${{ matrix.script }}
        working-directory: client
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows (+ SignPath)
    runs-on: windows-latest
    env:
      HAS_SIGNPATH: ${{ secrets.SIGNPATH_API_TOKEN != '' && 'yes' || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: client
      - name: Build
        run: npm run dist:win
        working-directory: client
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # SignPath needs the .exe as a GitHub Actions artifact (not release asset).
      - name: Upload unsigned .exe as Actions artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: dfchat-windows-unsigned
          path: client/release/*.exe
          retention-days: 7

      - name: Submit to SignPath for signing
        if: env.HAS_SIGNPATH == 'yes'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: client/release-signed/

      # Pick signed .exe if SignPath ran, otherwise unsigned.
      - name: Stage installer for release
        shell: bash
        run: |
          mkdir -p client/release-final
          if [ -d client/release-signed ] && ls client/release-signed/*.exe >/dev/null 2>&1; then
            cp client/release-signed/*.exe client/release-final/
            echo "Using signed .exe"
          else
            cp client/release/*.exe client/release-final/
            echo "Using unsigned .exe (no SignPath token configured)"
          fi
          ls -la client/release-final/

      - name: Upload Windows installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: client/release-final/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
