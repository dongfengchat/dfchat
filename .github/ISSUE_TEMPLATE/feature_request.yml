name: 💡 功能建议
description: 提议新功能或改进
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提建议！**先在这里开 issue 讨论再写代码** —— 避免你写完发现方向不对。

  - type: textarea
    id: problem
    attributes:
      label: 解决什么问题
      description: 你遇到了什么场景，现有功能不够用？
      placeholder: |
        例：群里被 @ 了根本看不出来，跟普通消息一样的红点。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      placeholder: |
        例：被 @ 时侧栏显示橙色 "@" 标记 + 不同音效。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的其他方案

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - 客户端 UI
        - 客户端 native (Electron)
        - 服务端 API
        - 服务端 realtime / WS
        - 直播 / SRS
        - 部署 / 运维
        - 文档
        - 其他 / 不确定
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 截图 / 参考
      description: 类似产品截图、Figma 草图、相关链接等
