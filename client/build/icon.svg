<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!--
    macOS Big Sur+ icon spec: the "live area" is 824×824 centered in a
    1024×1024 canvas, with 100px transparent padding on every side. Apple
    visually inflates this 824-region back to full size so all dock /
    Launchpad icons line up. Filling the entire 1024 (like the old icon
    did) makes the app look one size bigger than every native sibling.
    All artwork below is contained inside the 100..924 box.
  -->
  <g transform="translate(100 100) scale(0.8047)">
    <!-- Rounded squircle base, brand blue -->
    <rect width="1024" height="1024" rx="224" ry="224" fill="#3a64ee"/>
    <!-- Chat bubble: rounded body + small tail in lower-left -->
    <path d="
      M232 260
      H792
      a104 104 0 0 1 104 104
      V620
      a104 104 0 0 1 -104 104
      H552
      L368 870
      L368 724
      H232
      a104 104 0 0 1 -104 -104
      V364
      a104 104 0 0 1 104 -104
      Z
    " fill="#ffffff"/>
    <!-- Three typing dots -->
    <circle cx="380" cy="492" r="44" fill="#3a64ee"/>
    <circle cx="512" cy="492" r="44" fill="#3a64ee"/>
    <circle cx="644" cy="492" r="44" fill="#3a64ee"/>
    <!-- Live indicator: red ring with white core (top-right corner) -->
    <circle cx="824" cy="200" r="80" fill="#ef4444"/>
    <circle cx="824" cy="200" r="28" fill="#ffffff"/>
  </g>
</svg>
