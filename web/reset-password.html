<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0b0d11" />
<title>重置密码 · 东风快信</title>
<link rel="icon" href="/favicon.ico" sizes="any" />
<style>
  :root {
    --bg-1: #0b0d11; --bg-2: #15171d; --bg-3: #1c1f27; --bg-5: #3a4150;
    --ink-1: #f5f6f8; --ink-2: #cbd0d8; --ink-3: #94a0b0; --ink-4: #5f6a78;
    --brand-300: #8eaaff; --brand-500: #3a64ee; --brand-600: #2c4ed1;
    --accent-green: #3ba55c; --accent-red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh; background: var(--bg-1); color: var(--ink-1);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card {
    background: var(--bg-2); border: 1px solid rgba(58,65,80,.5);
    border-radius: 14px; padding: 32px; width: 100%; max-width: 420px;
  }
  h1 { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  p.lead { color: var(--ink-3); font-size: 14px; margin-top: 6px; line-height: 1.5; }
  .field { margin-top: 18px; }
  label { display: block; font-size: 12px; color: var(--ink-3); margin-bottom: 6px; }
  input {
    width: 100%; padding: 11px 13px; border-radius: 10px;
    background: #252934; border: 1px solid rgba(58,65,80,.6);
    color: var(--ink-1); font-size: 14px; outline: none;
  }
  input:focus { border-color: var(--brand-500); }
  button.primary {
    width: 100%; margin-top: 18px; padding: 12px;
    background: var(--brand-500); color: #fff; border: 0;
    border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  button.primary:hover { background: var(--brand-600); }
  button.primary:disabled { opacity: .6; cursor: not-allowed; }
  .msg {
    margin-top: 14px; padding: 10px 12px; border-radius: 8px;
    font-size: 13px; display: none;
  }
  .msg.success { display: block; background: rgba(59,165,92,.1); color: var(--accent-green); border: 1px solid rgba(59,165,92,.3); }
  .msg.error   { display: block; background: rgba(237,66,69,.1);  color: var(--accent-red);   border: 1px solid rgba(237,66,69,.3); }
  a { color: var(--brand-300); text-decoration: none; }
  a:hover { color: var(--brand-500); }
  .footer { text-align: center; margin-top: 18px; font-size: 12px; color: var(--ink-4); }
</style>
</head>
<body>
  <div class="card">
    <h1>🔑 重置密码</h1>
    <p class="lead">为东风快信账号设置新密码（至少 8 位）。重置后会自动登出所有设备。</p>

    <form id="form">
      <div class="field">
        <label for="password">新密码</label>
        <input id="password" type="password" minlength="8" required autofocus />
      </div>
      <div class="field">
        <label for="confirm">确认密码</label>
        <input id="confirm" type="password" minlength="8" required />
      </div>
      <button class="primary" type="submit" id="submit">重置密码</button>
      <div class="msg" id="msg"></div>
    </form>

    <p class="footer">
      <a href="/">返回首页</a> · 没账号？<a href="/#download">下载客户端注册</a>
    </p>
  </div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const form = document.getElementById('form');
const msg = document.getElementById('msg');
const submit = document.getElementById('submit');

function show(text, cls) {
  msg.textContent = text;
  msg.className = 'msg ' + cls;
}

if (!token) {
  form.style.display = 'none';
  show('链接无效：缺少 token 参数。请通过邮件中的链接打开。', 'error');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  if (password.length < 8)  { show('密码至少 8 位', 'error'); return; }
  if (password !== confirm) { show('两次密码不一致', 'error'); return; }

  submit.disabled = true;
  submit.textContent = '重置中…';
  try {
    const r = await fetch('https://app.dfchat.chat/api/v1/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, newPassword: password }),
    });
    if (r.ok) {
      show('✅ 密码重置成功！打开 DFCHAT 客户端用新密码登录即可。', 'success');
      form.style.display = 'none';
    } else {
      const data = await r.json().catch(() => ({}));
      show(data.message || '重置失败，链接可能已过期。请重新申请。', 'error');
    }
  } catch (err) {
    show('网络错误：' + err.message, 'error');
  } finally {
    submit.disabled = false;
    submit.textContent = '重置密码';
  }
});
</script>
</body>
</html>
