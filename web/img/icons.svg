<!--
  Single SVG sprite for all 9 feature icons. Reference them in HTML as:
    <svg class="feat-ic"><use href="/img/icons.svg#chat"/></svg>

  Style matches lucide-react (used in the desktop client) so brand stays
  consistent across web + app. 24×24 grid, 1.6 stroke, royal-blue tint
  inherited from the host CSS via `currentColor`.
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <!-- ====== symbol set ====== -->
    <symbol id="chat" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
    </symbol>

    <symbol id="call" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="23 7 16 12 23 17 23 7"/>
      <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
    </symbol>

    <symbol id="file" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
    </symbol>

    <symbol id="search" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </symbol>

    <symbol id="notify" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      <circle cx="18" cy="6" r="3" fill="#ed4245" stroke="none"/>
    </symbol>

    <symbol id="reaction" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
      <line x1="9" y1="9" x2="9.01" y2="9"/>
      <line x1="15" y1="9" x2="15.01" y2="9"/>
    </symbol>

    <symbol id="security" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      <path d="M9 12l2 2 4-4"/>
    </symbol>

    <symbol id="role" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </symbol>

    <symbol id="tls" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </symbol>

    <!-- Flat OS marks: solid silhouette so they read crisp at any size -->
    <symbol id="apple" viewBox="0 0 24 24" fill="currentColor">
      <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35-4.88-5.03-4.17-12.69 1.37-12.97 1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
    </symbol>

    <symbol id="windows" viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 3h8.5v8.5H3zM12.5 3H21v8.5h-8.5zM3 12.5h8.5V21H3zM12.5 12.5H21V21h-8.5z"/>
    </symbol>

    <!-- Tux-inspired flat penguin -->
    <symbol id="linux" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 1.6c-2 0-3.5 1.6-3.5 3.9 0 .6.1 1.2.3 1.7-1.7 1.2-2.7 3.1-2.7 5.2 0 1.5.5 2.9 1.3 4-.8 1-1.4 2.3-1.6 3.7-.1.6.4 1.1 1 1.1h10.4c.6 0 1.1-.5 1-1.1-.2-1.4-.7-2.7-1.6-3.7.8-1.1 1.3-2.5 1.3-4 0-2.1-1-4-2.7-5.2.2-.5.3-1.1.3-1.7C15.5 3.2 14 1.6 12 1.6zm-1.7 4.6c.5-.5 1.3-.5 1.7 0 .5.5.5 1.3 0 1.7-.5.5-1.3.5-1.7 0-.5-.5-.5-1.3 0-1.7zm3.4 0c.5-.5 1.3-.5 1.7 0 .5.5.5 1.3 0 1.7-.5.5-1.3.5-1.7 0-.5-.5-.5-1.3 0-1.7zM11 13.5h2c.5 0 .8.5.6.9l-1 1.7c-.2.4-.9.4-1.2 0l-1-1.7c-.2-.4.1-.9.6-.9z"/>
    </symbol>

    <!-- ====== Call-control icons (flat, lucide-style) ====== -->
    <symbol id="mic" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="2" width="6" height="12" rx="3"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </symbol>

    <symbol id="video" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="23 7 16 12 23 17 23 7"/>
      <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
    </symbol>

    <symbol id="screen" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
      <line x1="8" y1="21" x2="16" y2="21"/>
      <line x1="12" y1="17" x2="12" y2="21"/>
    </symbol>

    <symbol id="hangup" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <!-- Rotated phone (45° handset down = "hung up") -->
      <path d="M3 11.5c2.5-2 5.5-3 9-3s6.5 1 9 3l-2 3c-.7.5-1.6.5-2.3 0l-1.3-1c-.6-.4-.8-1.2-.5-1.8.1-.3.1-.6 0-.8C13.7 10.5 12.9 10.4 12 10.4s-1.7.1-2.9.5c-.1.2-.1.5 0 .8.3.6.1 1.4-.5 1.8L7.3 14.5c-.7.5-1.6.5-2.3 0z"/>
    </symbol>

    <!-- Broadcast / live / radio tower -->
    <symbol id="broadcast" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4.9 19.1A10 10 0 0 1 2 12 10 10 0 0 1 4.9 4.9"/>
      <path d="M7.8 16.2A6 6 0 0 1 6 12a6 6 0 0 1 1.8-4.2"/>
      <circle cx="12" cy="12" r="2" fill="currentColor"/>
      <path d="M16.2 7.8A6 6 0 0 1 18 12a6 6 0 0 1-1.8 4.2"/>
      <path d="M19.1 4.9A10 10 0 0 1 22 12a10 10 0 0 1-2.9 7.1"/>
    </symbol>

    <!-- Paperclip / attachment -->
    <symbol id="paperclip" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
    </symbol>

    <!-- Thumbs up -->
    <symbol id="thumb" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3z"/>
      <line x1="7" y1="22" x2="7" y2="11"/>
    </symbol>
  </defs>
</svg>
