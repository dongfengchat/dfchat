  <rect x="308" y="444" width="450" height="38" rx="19" fill="#252934"/>
  <text x="326" y="468" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#5f6a78">发条消息…</text>
  <circle cx="778" cy="463" r="18" fill="#3a64ee"/>
  <path d="M770 463 l8 -5 v10 z" fill="#fff"/>
