<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="聊天对话">
  <!-- Window -->
  <rect width="800" height="500" rx="20" fill="#15171d"/>
  <rect x="0" y="0" width="800" height="56" rx="20" fill="#1c1f27"/>
  <rect x="0" y="36" width="800" height="20" fill="#1c1f27"/>
  <circle cx="28" cy="28" r="6" fill="#ef4444"/>
  <circle cx="50" cy="28" r="6" fill="#f5b042"/>
  <circle cx="72" cy="28" r="6" fill="#3ba55c"/>

  <!-- Sidebar (compact) -->
  <rect x="0" y="56" width="80" height="444" fill="#0b0d11"/>
  <g>
    <rect x="20" y="80" width="40" height="40" rx="10" fill="#3a64ee"/>
    <text x="40" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">DC</text>

    <circle cx="40" cy="155" r="18" fill="#6f4dd1"/>
    <text x="40" y="159" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">张</text>

    <circle cx="40" cy="200" r="18" fill="#3a64ee" stroke="#8eaaff" stroke-width="2"/>
    <text x="40" y="204" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">L</text>

    <circle cx="40" cy="245" r="18" fill="#ed7d2b"/>
    <text x="40" y="249" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">W</text>
  </g>

  <!-- Header -->
  <rect x="80" y="56" width="720" height="56" fill="#15171d"/>
  <circle cx="116" cy="84" r="18" fill="#3a64ee"/>
  <text x="116" y="88" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">L</text>
  <text x="146" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#f5f6f8">设计师 Lily</text>
  <circle cx="148" cy="92" r="3" fill="#3ba55c"/>
  <text x="158" y="96" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#94a0b0">在线</text>

  <!-- Header right icons (phone, video, info) -->
  <g stroke="#cbd0d8" stroke-width="1.5" fill="none" stroke-linecap="round">
    <!-- phone -->
    <path d="M704 76 q-4 0 -4 4 q0 16 14 30 t30 14 q4 0 4 -4 v-8 a3 3 0 0 0 -3 -3 l-5 -1 a3 3 0 0 0 -3 1 l-3 3 q-9 -4 -16 -11 t-11 -16 l3 -3 a3 3 0 0 0 1 -3 l-1 -5 a3 3 0 0 0 -3 -3 z"/>
    <!-- video -->
    <rect x="760" y="76" width="22" height="16" rx="3"/>
    <path d="M782 80 l8 -4 v12 l-8 -4 z" fill="#cbd0d8"/>
  </g>
  <line x1="80" y1="112" x2="800" y2="112" stroke="#3a4150"/>

  <!-- Messages area -->
  <!-- their msg 1 -->
  <circle cx="115" cy="160" r="16" fill="#3a64ee"/>
  <text x="115" y="164" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">L</text>
  <rect x="140" y="148" width="260" height="36" rx="14" fill="#1c1f27"/>
  <rect x="140" y="168" width="14" height="16" fill="#1c1f27"/>
  <text x="158" y="171" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#f5f6f8">原型图发你了，第二页 OK 吗？</text>

  <!-- my msg 1 -->
  <rect x="500" y="200" width="220" height="36" rx="14" fill="#3a64ee"/>
  <rect x="706" y="220" width="14" height="16" fill="#3a64ee"/>
  <text x="518" y="223" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#fff">收到，正在改 ✏️</text>

  <!-- their msg 2 with reaction -->
  <circle cx="115" cy="270" r="16" fill="#3a64ee"/>
  <text x="115" y="274" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">L</text>
  <rect x="140" y="258" width="180" height="36" rx="14" fill="#1c1f27"/>
  <text x="158" y="281" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#f5f6f8">👍 辛苦啦</text>
  <!-- reaction chip -->
  <rect x="148" y="298" width="56" height="22" rx="11" fill="#252934" stroke="#3a64ee"/>
  <text x="176" y="313" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#cbd0d8" text-anchor="middle">❤️ 2</text>

  <!-- my msg 2 with attachment -->
  <rect x="450" y="338" width="270" height="56" rx="14" fill="#3a64ee"/>
  <rect x="706" y="380" width="14" height="14" fill="#3a64ee"/>
  <!-- file icon -->
  <rect x="464" y="350" width="32" height="32" rx="6" fill="rgba(255,255,255,0.18)"/>
  <path d="M474 358 v16 M469 366 h10 M469 370 h10" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <text x="504" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#fff">设计稿_v2.fig</text>
  <text x="504" y="384" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">2.4 MB · 点击下载</text>

  <!-- Input bar -->
  <line x1="80" y1="420" x2="800" y2="420" stroke="#3a4150"/>
  <rect x="100" y="436" width="600" height="40" rx="20" fill="#252934"/>
  <!-- + icon -->
  <circle cx="125" cy="456" r="11" fill="none" stroke="#94a0b0" stroke-width="1.5"/>
  <path d="M125 451 v10 M120 456 h10" stroke="#94a0b0" stroke-width="1.5" stroke-linecap="round"/>
  <text x="150" y="460" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#5f6a78">发条消息…  @ 提及 · ⌘V 粘贴图片</text>
  <!-- send -->
  <circle cx="720" cy="456" r="20" fill="#3a64ee"/>
  <path d="M712 456 l8 -6 v12 z" fill="#fff"/>
  <path d="M712 456 h12" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
</svg>
