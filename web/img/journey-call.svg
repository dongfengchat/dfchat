<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="视频通话">
  <!-- Window -->
  <rect width="800" height="500" rx="20" fill="#0b0d11"/>
  <rect x="0" y="0" width="800" height="56" rx="20" fill="#15171d"/>
  <rect x="0" y="36" width="800" height="20" fill="#15171d"/>
  <circle cx="28" cy="28" r="6" fill="#ef4444"/>
  <circle cx="50" cy="28" r="6" fill="#f5b042"/>
  <circle cx="72" cy="28" r="6" fill="#3ba55c"/>

  <!-- Title -->
  <text x="400" y="34" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#cbd0d8" text-anchor="middle">视频通话 · 00:42</text>

  <!-- Big remote video frame -->
  <rect x="40" y="80" width="720" height="320" rx="14" fill="#1c1f27"/>

  <!-- Person silhouette (centered, flat) -->
  <circle cx="400" cy="200" r="50" fill="#3a64ee"/>
  <ellipse cx="400" cy="320" rx="120" ry="80" fill="#3a64ee"/>
  <rect x="40" y="320" width="720" height="80" fill="#1c1f27"/>

  <!-- Remote name pill -->
  <rect x="60" y="370" width="140" height="26" rx="13" fill="rgba(0,0,0,0.5)"/>
  <circle cx="76" cy="383" r="6" fill="#3ba55c"/>
  <text x="92" y="388" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#fff">设计师 Lily</text>

  <!-- HD pill -->
  <rect x="660" y="100" width="80" height="26" rx="13" fill="rgba(0,0,0,0.55)"/>
  <text x="700" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">HD · 720p</text>

  <!-- Self preview (PiP) -->
  <rect x="600" y="270" width="140" height="100" rx="10" fill="#252934" stroke="#3a4150"/>
  <circle cx="670" cy="305" r="18" fill="#ed7d2b"/>
  <ellipse cx="670" cy="355" rx="48" ry="32" fill="#ed7d2b"/>
  <rect x="600" y="355" width="140" height="15" rx="10" fill="#252934"/>
  <text x="608" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#fff">我</text>

  <!-- Control bar -->
  <rect x="240" y="430" width="320" height="54" rx="27" fill="#1c1f27" stroke="#3a4150"/>

  <!-- mute -->
  <circle cx="280" cy="457" r="18" fill="#252934"/>
  <path d="M280 449 a4 6 0 0 1 4 6 v2 a4 6 0 0 1 -8 0 v-2 a4 6 0 0 1 4 -6 z M274 458 v0 a6 6 0 0 0 12 0 v0 M280 466 v3" stroke="#cbd0d8" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- camera off (highlighted) -->
  <circle cx="340" cy="457" r="18" fill="#ef4444"/>
  <rect x="331" y="450" width="14" height="12" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
  <path d="M345 453 l5 -3 v12 l-5 -3 z" fill="none" stroke="#fff" stroke-width="1.5"/>
  <line x1="327" y1="447" x2="353" y2="469" stroke="#fff" stroke-width="2"/>

  <!-- screen share -->
  <circle cx="400" cy="457" r="18" fill="#252934"/>
  <rect x="389" y="449" width="22" height="14" rx="2" fill="none" stroke="#cbd0d8" stroke-width="1.5"/>
  <line x1="395" y1="465" x2="405" y2="465" stroke="#cbd0d8" stroke-width="1.5"/>
  <path d="M400 452 v6 M397 455 l3 -3 l3 3" stroke="#cbd0d8" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- more -->
  <circle cx="460" cy="457" r="18" fill="#252934"/>
  <circle cx="452" cy="457" r="2" fill="#cbd0d8"/>
  <circle cx="460" cy="457" r="2" fill="#cbd0d8"/>
  <circle cx="468" cy="457" r="2" fill="#cbd0d8"/>

  <!-- hang up (red, longer) -->
  <rect x="495" y="439" width="46" height="36" rx="18" fill="#ef4444"/>
  <path d="M508 458 q0 -8 10 -8 t10 8 v3 a3 3 0 0 1 -3 3 h-5 a3 3 0 0 1 -3 -3 v-2 q-3 -1 -8 -1 q-5 0 -8 1 v2 a3 3 0 0 1 -3 3 h0 z"
        fill="#fff" transform="rotate(135 518 458)"/>
</svg>
