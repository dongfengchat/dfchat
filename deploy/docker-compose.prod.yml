# DFCHAT production stack.
#
# Layout:
#   - api      → Go binary, internal
#   - nginx    → public 80/443, reverse proxy to api + /ws WebSocket
#   - postgres → internal only
#   - redis    → internal only
#   - nats     → internal only
#   - minio    → publicly exposes :9000 so clients can PUT/GET presigned URLs
#
# Run from /opt/dfchat:
#     docker compose -f deploy/docker-compose.prod.yml --env-file .env up -d --build
#
# Secrets come from the sibling .env (generated by deploy.sh).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/dfchat/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - /opt/dfchat/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: ["-js"]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    # No more --tls — nginx terminates TLS for us at files.dfchat.chat
    # and proxies to http://minio:9000 over the internal docker network.
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Browser CORS — MinIO honours these on direct PUT requests from
      # browsers (presigned uploads).
      MINIO_BROWSER_REDIRECT_URL: https://files.dfchat.chat/
    volumes:
      - /opt/dfchat/data/minio:/data
    ports:
      # No more public :9000 — only the internal docker network reaches MinIO.
      # Console stays on localhost so an SSH tunnel can hit it for debugging.
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs --max-time 3 http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  srs:
    image: ossrs/srs:6
    restart: unless-stopped
    # SRS doesn't expand env vars inside its config file. envsubst isn't in
    # the base image and apk often fails offline, so use plain busybox sed
    # to substitute ${LIVE_SRS_HOOK_URL} → its value at start time.
    entrypoint:
      - sh
      - -c
      - |
        sed "s|\$${LIVE_SRS_HOOK_URL}|$$LIVE_SRS_HOOK_URL|g" \
          /usr/local/srs/conf/dfchat.conf.tmpl \
          > /usr/local/srs/conf/dfchat.conf
        exec ./objs/srs -c conf/dfchat.conf
    environment:
      LIVE_SRS_HOOK_URL: http://api:8080/api/v1/live/srs-hook/${LIVE_SRS_SECRET}
    volumes:
      - ./srs.conf:/usr/local/srs/conf/dfchat.conf.tmpl:ro
      # HLS segments + DVR mp4s persist here so they survive container restarts.
      - /opt/dfchat/data/srs:/usr/local/srs/objs/nginx/html
    ports:
      - "1935:1935"           # RTMP ingest, public for OBS
      - "127.0.0.1:1985:1985" # SRS HTTP API, localhost only
    # HTTP-FLV / HLS on container :8080 is consumed via the docker network
    # by nginx (proxy /hls + /live.flv). No public mapping needed.
    depends_on:
      api:
        condition: service_started

  migrate:
    image: migrate/migrate:v4.18.1
    # One-shot: apply migrations then exit.
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations:ro
    command: [
      "-path=/migrations",
      "-database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable",
      "up",
    ]

  api:
    build:
      context: ../server
      dockerfile: Dockerfile
    image: dfchat/api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_HOURS: "2"
      JWT_REFRESH_TTL_HOURS: "720"
      CORS_ALLOW_ORIGINS: "*"
      # When HTTPS is set up these get overridden in .env to:
      #   MINIO_ENDPOINT=<domain>:9000
      #   MINIO_USE_SSL=true
      #   MINIO_PUBLIC_URL=https://<domain>:9000
      # MinIO talks plain HTTP on the docker network (nginx terminates TLS at
      # files.dfchat.chat). MINIO_PUBLIC_URL is what we sign presigned URLs
      # with — must match what browsers can reach.
      MINIO_ENDPOINT: minio:9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: dfchat
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://files.dfchat.chat}
      LIVE_RTMP_URL: ${LIVE_RTMP_URL}
      LIVE_HLS_URL: ${LIVE_HLS_URL}
      LIVE_SRS_SECRET: ${LIVE_SRS_SECRET}
      SRS_API_BASE_URL: http://srs:1985/api/v1/summaries
      TURN_SECRET: ${TURN_SECRET}
      TURN_HOST: ${TURN_HOST:-dfchat.chat}
      TURN_TLS_ENABLED: "true"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/dfchat/data/letsencrypt:/etc/letsencrypt
      - /opt/dfchat/data/certbot-webroot:/var/www/certbot:ro
      # Static marketing site + /download/ binaries (filled by setup-website.sh
      # and upload-binary.sh). Harmless if empty.
      - /opt/dfchat/web:/var/www/dfchat:ro

  # coturn: STUN/TURN server for WebRTC. Symmetric NAT users need TURN
  # relay, otherwise calls fail to connect. host network mode is REQUIRED:
  # coturn allocates random relay ports in 49152-65535 and they have to
  # match what coturn advertises — that only works on host networking.
  coturn:
    image: coturn/coturn:4.6
    restart: unless-stopped
    network_mode: host
    volumes:
      - /opt/dfchat/data/letsencrypt:/etc/letsencrypt:ro
    command:
      - -n
      - --log-file=stdout
      - --realm=dfchat.chat
      - --listening-port=3478
      - --tls-listening-port=5349
      - --min-port=49152
      - --max-port=49500
      - --use-auth-secret
      - --static-auth-secret=${TURN_SECRET}
      - --no-tlsv1
      - --no-tlsv1_1
      - --no-multicast-peers
      - --no-cli
      - --cert=/etc/letsencrypt/live/dfchat/fullchain.pem
      - --pkey=/etc/letsencrypt/live/dfchat/privkey.pem
