# DFCHAT production stack.
#
# Layout:
#   - api      → Go binary, internal
#   - nginx    → public 80/443, reverse proxy to api + /ws WebSocket
#   - postgres → internal only
#   - redis    → internal only
#   - nats     → internal only
#   - minio    → publicly exposes :9000 so clients can PUT/GET presigned URLs
#
# Run from /opt/dfchat:
#     docker compose -f deploy/docker-compose.prod.yml --env-file .env up -d --build
#
# Secrets come from the sibling .env (generated by deploy.sh).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/dfchat/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - /opt/dfchat/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: ["-js"]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    # No more --tls — nginx terminates TLS for us at files.dfchat.chat
    # and proxies to http://minio:9000 over the internal docker network.
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Browser CORS — MinIO honours these on direct PUT requests from
      # browsers (presigned uploads).
      MINIO_BROWSER_REDIRECT_URL: https://files.dfchat.chat/
    volumes:
      - /opt/dfchat/data/minio:/data
    ports:
      # No more public :9000 — only the internal docker network reaches MinIO.
      # Console stays on localhost so an SSH tunnel can hit it for debugging.
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs --max-time 3 http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # SRS moved to server02 (live.dfchat.chat) — see deploy/server02/.
  # api now talks to SRS only via the public on_publish hook coming
  # in over https://app.dfchat.chat/api/v1/live/srs-hook/<secret>. The
  # `srs.conf` and old `/opt/dfchat/data/srs/` data dir are dead weight
  # on server01 now; keep the data dir for a couple weeks in case we
  # need to roll back, then `rm -rf` once everyone's on v0.1.32+.

  migrate:
    image: migrate/migrate:v4.18.1
    # One-shot: apply migrations then exit.
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations:ro
    command: [
      "-path=/migrations",
      "-database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable",
      "up",
    ]

  api:
    build:
      context: ../server
      dockerfile: Dockerfile
    image: dfchat/api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_HOURS: "2"
      JWT_REFRESH_TTL_HOURS: "720"
      CORS_ALLOW_ORIGINS: "*"
      # When HTTPS is set up these get overridden in .env to:
      #   MINIO_ENDPOINT=<domain>:9000
      #   MINIO_USE_SSL=true
      #   MINIO_PUBLIC_URL=https://<domain>:9000
      # MinIO talks plain HTTP on the docker network (nginx terminates TLS at
      # files.dfchat.chat). MINIO_PUBLIC_URL is what we sign presigned URLs
      # with — must match what browsers can reach.
      MINIO_ENDPOINT: minio:9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: dfchat
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://files.dfchat.chat}
      LIVE_RTMP_URL: ${LIVE_RTMP_URL}
      LIVE_HLS_URL: ${LIVE_HLS_URL}
      LIVE_SRS_SECRET: ${LIVE_SRS_SECRET}
      # SRS reconcile loop is disabled — the SRS HTTP API moved to
      # server02 and isn't reachable cross-host without a private
      # tunnel. Empty value makes the loop log "disabled" and skip.
      # Trade-off: if SRS on server02 restarts mid-stream and the
      # on_unpublish webhooks are lost, affected rooms stay status=1
      # until the host manually clicks 结束直播. To re-enable: expose
      # SRS API on server02 via a secret-auth nginx location and set
      # SRS_API_BASE_URL=https://live.dfchat.chat/srs-api/...
      SRS_API_BASE_URL: ""
      TURN_SECRET: ${TURN_SECRET}
      TURN_HOST: ${TURN_HOST:-dfchat.chat}
      TURN_TLS_ENABLED: "true"
      # Outbound SMTP for email verification + password reset.
      # Empty SMTP_HOST → mailer logs to stdout instead of sending (dev mode).
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://dfchat.chat}
      # AI moderation worker (Phase B). Disabled by default — flip
      # MODERATION_ENABLED=true in .env once at least one provider's
      # API key is configured. MODERATION_PROVIDERS is a CSV fallback
      # chain (e.g. "anthropic,openai" → try Claude first, GPT if
      # Claude errors).
      MODERATION_ENABLED: ${MODERATION_ENABLED:-false}
      MODERATION_PROVIDERS: ${MODERATION_PROVIDERS:-anthropic}
      MODERATION_INTERVAL_SECONDS: ${MODERATION_INTERVAL_SECONDS:-60}
      MODERATION_THRESHOLD: ${MODERATION_THRESHOLD:-0.7}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-7}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      MODERATION_LOCAL_ENDPOINT: ${MODERATION_LOCAL_ENDPOINT:-}
      MODERATION_LOCAL_MODEL: ${MODERATION_LOCAL_MODEL:-qwen2.5-vl}
      # Evidence archive — bind-mounted from host below so frames
      # survive api container restarts.
      MODERATION_EVIDENCE_DIR: /var/lib/dfchat/evidence
    volumes:
      # Evidence archive (AI moderation snapshots). Host path lives
      # alongside other dfchat data; mounted RW so the api worker
      # can write + the admin file-server endpoint can read.
      - /opt/dfchat/data/evidence:/var/lib/dfchat/evidence

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/dfchat/data/letsencrypt:/etc/letsencrypt
      - /opt/dfchat/data/certbot-webroot:/var/www/certbot:ro
      # Static marketing site + /download/ binaries (filled by setup-website.sh
      # and upload-binary.sh). Harmless if empty.
      - /opt/dfchat/web:/var/www/dfchat:ro

  # coturn: STUN/TURN server for WebRTC. Symmetric NAT users need TURN
  # relay, otherwise calls fail to connect. host network mode is REQUIRED:
  # coturn allocates random relay ports in 49152-65535 and they have to
  # match what coturn advertises — that only works on host networking.
  coturn:
    image: coturn/coturn:4.6
    restart: unless-stopped
    network_mode: host
    volumes:
      - /opt/dfchat/data/letsencrypt:/etc/letsencrypt:ro
    command:
      - -n
      - --log-file=stdout
      - --realm=dfchat.chat
      - --listening-port=3478
      - --tls-listening-port=5349
      - --min-port=49152
      - --max-port=49500
      - --use-auth-secret
      - --static-auth-secret=${TURN_SECRET}
      - --no-tlsv1
      - --no-tlsv1_1
      - --no-multicast-peers
      - --no-cli
      - --cert=/etc/letsencrypt/live/dfchat/fullchain.pem
      - --pkey=/etc/letsencrypt/live/dfchat/privkey.pem
