# DFCHAT — SRS (Simple Realtime Server) config
#
# What this enables:
#   - RTMP ingest on :1935  (OBS / FFmpeg push target)
#   - HTTP-FLV / HLS on :8080
#   - HTTP API on :1985 (internal only)
#   - DVR mode: each finished stream gets a flv on disk + an on_dvr hook
#
# Auth model: every publish triggers an HTTP POST to our Go API. The API
# looks up the stream key in live_rooms and approves (HTTP 200 + body "0")
# or rejects. The on_publish / on_unpublish / on_dvr hooks let us flip
# room.status live ↔ ended and record DVR files.

listen              1935;
max_connections     1000;
daemon              off;            # required in docker
srs_log_tank        console;        # write to stdout for docker logs

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

stats {
    network         0;
}

vhost __defaultVhost__ {
    # HLS — generate m3u8 + ts segments.
    # SRS auto-appends `{app}/{stream}.m3u8` under hls_path. Our RTMP URL is
    # rtmp://host/live/<streamKey> → app=live, so files land at
    #   ./objs/nginx/html/live/<streamKey>.m3u8
    # which matches the nginx `proxy_pass http://srs/live/$1` location.
    # Earlier this was `./objs/nginx/html/live` which produced a spurious
    # extra `live/` directory (live/live/<key>.m3u8) and broke playback.
    hls {
        enabled                 on;
        hls_path                ./objs/nginx/html;
        hls_fragment            2;
        hls_window              30;
        hls_cleanup             on;
        hls_dispose             120;
        # SRS 6+ defaults hls_ctx ON, which wraps the m3u8 with a redirect
        # to ?hls_ctx=<token> on an absolute "/live/..." path. nginx only
        # proxies /hls/* to SRS, so the redirect 404s and viewers see a
        # black player. We don't need viewer tracking here, so disable.
        hls_ctx                 off;
        hls_ts_ctx              off;
    }

    # HTTP-FLV — low-latency alt for browsers that prefer flv.js
    http_remux {
        enabled     on;
        mount       /live/[stream].flv;
    }

    # DVR — disabled. Recording each session to disk filled ~19 GB in
    # weeks, and the historical-replay UI was turned off for now to keep
    # storage in check. Re-enable here + flip the client recordings list
    # back on if you ever need replays.
    dvr {
        enabled         off;
    }

    # HTTP callbacks — all point at our Go API. The URL templating below is
    # set via $LIVE_SRS_HOOK_URL at container start (entrypoint substitutes it).
    http_hooks {
        enabled         on;
        on_publish      ${LIVE_SRS_HOOK_URL};
        on_unpublish    ${LIVE_SRS_HOOK_URL};
        on_dvr          ${LIVE_SRS_HOOK_URL};
    }

    # Transcode the original stream into a "smooth" 480p variant so viewers
    # on poor connections / mobile data don't have to pull the full 1080p.
    # The transcoded variant is re-published back into SRS as `<key>_ld`,
    # which our API hook lets through (see srsHook in server/internal/live).
    # 1080p / original is still served as-is at <key>.m3u8 — the client
    # picks which one to play and requires explicit "agree" for 原画.
    transcode {
        enabled         on;
        ffmpeg          ./objs/ffmpeg/bin/ffmpeg;
        engine ld {
            enabled         on;
            vfilter {
            }
            vcodec          libx264;
            vbitrate        700;
            vfps            24;
            vwidth          854;
            vheight         480;
            vthreads        2;
            vprofile        baseline;
            vpreset         veryfast;
            vparams {
                tune        zerolatency;
            }
            acodec          aac;
            abitrate        64;
            asample_rate    44100;
            achannels       2;
            aparams {
            }
            output          rtmp://127.0.0.1:[port]/[app]?vhost=[vhost]/[stream]_ld;
        }
    }

    # Reasonable RTMP / GOP defaults.
    gop_cache       on;
    queue_length    10;
    tcp_nodelay     on;
    publish_1stpkt_timeout  20000;
    publish_normal_timeout  7000;
}
