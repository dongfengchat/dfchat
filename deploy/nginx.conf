user  nginx;
worker_processes  auto;
events { worker_connections 4096; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on; tcp_nopush on; tcp_nodelay on;
  keepalive_timeout 75s;
  client_max_body_size 110m;

  # m3u8 should never be cached, ts can be cached briefly.
  types {
    application/vnd.apple.mpegurl m3u8;
    video/mp2t                    ts;
    application/vnd.apple.installer+xml dmg;
    application/x-msdownload             exe;
    application/x-executable             AppImage;
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  map $http_upgrade $connection_upgrade { default upgrade; '' close; }

  log_format combined_ms '$remote_addr [$time_local] "$request" '
                         '$status $body_bytes_sent rt=$request_time';
  access_log /var/log/nginx/access.log combined_ms;
  error_log  /var/log/nginx/error.log warn;

  upstream dfchat_api   { server api:8080; }
  # SRS upstream removed — media stack moved to server02 (live.dfchat.chat).
  # See deploy/server02/ for the edge config.
  # MinIO internal HTTP (we terminate TLS at nginx now, no more public :9000).
  upstream dfchat_minio { server minio:9000; }

  # ---- :80 — ACME + force HTTPS ----
  server {
    listen 80 default_server;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  # ---- :443 on apex (+ www) — website + downloads + HLS playback ----
  server {
    listen 443 ssl http2;
    server_name dfchat.chat;

    ssl_certificate     /etc/letsencrypt/live/dfchat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dfchat/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    root /var/www/dfchat/dist;
    index index.html;

    location /download/ {
      alias /var/www/dfchat/download/;
      add_header Content-Disposition "attachment" always;
      add_header Cache-Control "public, max-age=300" always;
      autoindex off;
    }

    # HLS playback was moved to server02 (live.dfchat.chat) — see
    # deploy/server02/. server01 no longer serves /hls/* or runs SRS.
    # /flv/ was also dropped along with the SRS upstream; if you bring
    # FLV viewing back, do it on the edge box, not here.

    location / {
      try_files $uri $uri/ /index.html;
    }
  }

  # ---- :443 on www.<domain> — 301 to apex (canonical) ----
  server {
    listen 443 ssl http2;
    server_name www.dfchat.chat;
    ssl_certificate     /etc/letsencrypt/live/dfchat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dfchat/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    return 301 https://dfchat.chat$request_uri;
  }

  # ---- :443 on app.<domain> — REST API + WebSocket ----
  server {
    listen 443 ssl http2;
    server_name app.dfchat.chat;

    ssl_certificate     /etc/letsencrypt/live/dfchat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dfchat/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    add_header Access-Control-Allow-Origin "https://dfchat.chat" always;
    add_header Access-Control-Allow-Methods "GET,POST,PATCH,DELETE,OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type,Authorization,X-Refresh-Token" always;
    if ($request_method = OPTIONS) { return 204; }

    location /healthz { proxy_pass http://dfchat_api; }
    # Prometheus metrics — restrict to internal docker network only.
    location /metrics {
      allow 172.16.0.0/12;
      allow 10.0.0.0/8;
      allow 127.0.0.1;
      deny all;
      proxy_pass http://dfchat_api;
    }

    # SRS HTTP callbacks (on_publish / on_unpublish / on_dvr). With SRS
    # moved off-box to server02, on_publish hooks now arrive over the
    # public internet from 45.119.4.109 — added to the allowlist below.
    # The docker private ranges are kept too in case we ever bring an
    # internal SRS back. The path-segment secret stops random scanners
    # but the IP allowlist is the real gate (the secret leaks into
    # nginx access logs anyway).
    # Goes BEFORE the generic /api/ block because nginx picks the
    # longest-prefix match for prefix locations.
    location /api/v1/live/srs-hook/ {
      allow 45.119.4.109;             # server02 edge node
      allow 172.16.0.0/12;
      allow 10.0.0.0/8;
      allow 127.0.0.1;
      deny all;
      proxy_pass http://dfchat_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://dfchat_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
      proxy_pass http://dfchat_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    location = / {
      add_header Content-Type "text/plain; charset=utf-8";
      return 200 "DFCHAT API.\nVisit https://dfchat.chat/ for the website.\n";
    }
  }

  # ---- :443 on files.<domain> — MinIO behind nginx (no more public :9000) ----
  server {
    listen 443 ssl http2;
    server_name files.dfchat.chat;
    ssl_certificate     /etc/letsencrypt/live/dfchat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dfchat/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # MinIO needs a generous body limit for big files + presigned uploads.
    client_max_body_size 200m;
    proxy_buffering off;
    proxy_request_buffering off;
    chunked_transfer_encoding on;

    # Browser preflight needs CORS even for S3-style requests.
    add_header Access-Control-Allow-Origin "https://dfchat.chat" always;
    add_header Access-Control-Allow-Methods "GET,PUT,POST,DELETE,HEAD,OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type,Content-MD5,x-amz-*,X-Amz-*" always;
    add_header Access-Control-Expose-Headers "ETag" always;

    location / {
      proxy_pass http://dfchat_minio;
      proxy_http_version 1.1;
      # CRITICAL: forward Host as "minio:9000" — not files.dfchat.chat.
      # The api signs presigned PUT/GET URLs using the MinIO SDK
      # initialized with endpoint=minio:9000, so the canonical request's
      # `host:` header is "minio:9000". If we forward the browser's
      # `Host: files.dfchat.chat` upstream, MinIO recomputes the
      # signature against that host and rejects every upload with
      # 403 SignatureDoesNotMatch. Pinning the upstream Host keeps the
      # public URL pretty (browser still sees files.dfchat.chat) while
      # the bytes MinIO actually verifies match what the SDK signed.
      proxy_set_header Host minio:9000;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_connect_timeout 10s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
    }
  }
}
