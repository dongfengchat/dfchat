# DFCHAT server02 — live media edge node.
#
# Layout (intentionally minimal — no DB, no MinIO, no Go api here):
#   - srs      → RTMP ingest on :1935 + HLS slice on internal :8080
#   - nginx    → openresty (nginx + lua), terminates TLS on live.dfchat.chat,
#                local HMAC verify of HLS signed URLs, in-process m3u8 rewrite
#   - certbot  → ACME renewal (sidecar; runs renew loop)
#
# Run from /opt/dfchat-live:
#     docker compose --env-file .env up -d --build
#
# Secrets come from sibling .env (generated by bootstrap.sh).
# The single security-critical secret here is LIVE_SRS_SECRET — must match
# the value on server01 so HMAC playback URLs server01 signs verify here.

services:
  srs:
    image: ossrs/srs:6
    restart: unless-stopped
    # SRS doesn't expand env vars inside its config. Same trick as server01:
    # sed-substitute ${LIVE_SRS_HOOK_URL} at start, then exec srs in foreground.
    # The background ts/mp4 sweeper handles SRS's known "crash leaves orphan
    # segments forever" failure mode. Identical to server01's sweeper.
    entrypoint:
      - sh
      - -c
      - |
        sed "s|\$${LIVE_SRS_HOOK_URL}|$$LIVE_SRS_HOOK_URL|g" \
          /usr/local/srs/conf/dfchat.conf.tmpl \
          > /usr/local/srs/conf/dfchat.conf
        # Background ts/m3u8 sweeper. SRS image has no wget/curl, so the
        # earlier "ask the SRS HTTP API which streams are live" approach
        # silently fell back to deleting everything (active="") — luckily
        # the -mmin +60 filter saved us. New approach: rely on file mtime
        # alone. SRS touches every HLS fragment as it writes, so anything
        # untouched for >60 min is definitely from a dead stream. Simpler,
        # works with zero external tools.
        (
          while sleep 1800; do
            find /usr/local/srs/objs/nginx/html/live -type f \
              \( -name '*.ts' -o -name '*.mp4' -o -name '*.m3u8' \) \
              -mmin +60 -delete 2>/dev/null
          done
        ) &
        exec ./objs/srs -c conf/dfchat.conf
    environment:
      # SRS publishes RTMP, then POSTs hooks (on_publish / on_unpublish /
      # on_dvr) to server01's api over the **public** internet — there's
      # no docker bridge to share. server01 nginx whitelists our IP for
      # the /api/v1/live/srs-hook/ path.
      LIVE_SRS_HOOK_URL: https://app.dfchat.chat/api/v1/live/srs-hook/${LIVE_SRS_SECRET}
    volumes:
      - ./srs.conf:/usr/local/srs/conf/dfchat.conf.tmpl:ro
      # HLS segments persist here so a container restart doesn't immediately
      # break ongoing playback. nginx (next service) reads from this same
      # mount via the `srs_html` named volume share below.
      - /opt/dfchat-live/data/srs:/usr/local/srs/objs/nginx/html
    ports:
      # RTMP ingest, public — OBS / FFmpeg push here.
      - "1935:1935"
      # SRS HTTP API — localhost only, used by the sweeper above.
      - "127.0.0.1:1985:1985"
    # HLS files written into the shared volume; nginx serves them directly.
    # SRS's own HTTP server on 8080 stays available on the internal docker
    # bridge for things like the wget probe above.
    healthcheck:
      # SRS image lacks wget + curl. bash's /dev/tcp built-in opens a
      # raw TCP connection — succeeds iff something is listening on the
      # SRS API port. Doesn't verify the API replies sanely, but it's
      # zero-dependency and good enough to detect "container crashed".
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/1985"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    # Stock nginx alpine bundles ngx_http_js_module.so (njs) and a
    # standalone /usr/bin/njs cli. We use njs over openresty/lua because
    # openresty 1.27 still uses the deprecated SHA256_Init OpenSSL 1.x
    # symbol that newer system libssl doesn't export — every digest
    # call dies with "Symbol not found". njs's crypto.createHmac uses
    # OpenSSL EVP API directly and works on every distro.
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - srs
    ports:
      - "80:80"
      - "443:443"
    environment:
      # njs reads this via process.env at module load. Same value as
      # the one on server01 — that's how cross-machine HMAC works.
      LIVE_SRS_SECRET: ${LIVE_SRS_SECRET}
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./njs:/etc/nginx/njs:ro
      - /opt/dfchat-live/data/letsencrypt:/etc/letsencrypt
      - /opt/dfchat-live/data/certbot-webroot:/var/www/certbot:ro
      # HLS file root — nginx serves /hls/* directly from here after
      # njs verify. Same path SRS writes to.
      - /opt/dfchat-live/data/srs:/var/www/hls:ro

  # NB: no certbot/acme sidecar container. The neilpang/acme.sh and
  # certbot images both fail to pull through this network (mirror blobs
  # reset mid-download), and certbot's Python TLS fingerprint is also
  # blocked from this host even when installed. We instead install
  # acme.sh natively on the host (one-line curl install — see
  # issue-cert.sh). It installs its own cron entry that renews daily
  # via curl (which works fine here) and reloads nginx via the same
  # docker compose exec command. No container for the renewer needed.
