# DFCHAT — server02 edge nginx (nginx:1.27-alpine + njs).
#
# One job: serve signed HLS playback for live.dfchat.chat. Every request
# is verified locally in njs against the same HMAC secret server01's Go
# code uses to sign URLs. Zero upstream roundtrip per segment.
#
# njs runs synchronously inside nginx workers — single-threaded per
# worker, but evented across them. The ngx_http_js_module.so module
# ships in the stock nginx:1.27-alpine image; load it explicitly here
# rather than dropping the file in /etc/nginx/modules-enabled/ so this
# config is portable across distros.

load_module modules/ngx_http_js_module.so;

user  nginx;
worker_processes  auto;
events { worker_connections 4096; }

# Make the LIVE_SRS_SECRET env var visible to njs. Without this `env`
# directive, process.env reads return undefined and every signature
# check fails 401 — extremely confusing during smoke tests.
env LIVE_SRS_SECRET;

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on; tcp_nopush on; tcp_nodelay on;
  keepalive_timeout 75s;
  # nginx:1.27-alpine's stock mime.types already maps .m3u8 and .ts
  # correctly (verified via `nginx -t`), so no override needed here.

  log_format combined_ms '$remote_addr [$time_local] "$request" '
                         '$status $body_bytes_sent rt=$request_time';
  access_log /var/log/nginx/access.log combined_ms;
  error_log  /var/log/nginx/error.log warn;

  # Load the njs module file. js_path tells njs where to resolve
  # `import "./foo"` from; js_import binds the named exports of hls.js
  # to the `hls.` namespace usable in directives below.
  js_path "/etc/nginx/njs/";
  js_import hls from hls.js;

  # ---- :80 — ACME + force HTTPS ----
  server {
    listen 80 default_server;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  # ---- :443 on live.dfchat.chat — signed HLS ----
  server {
    listen 443 ssl;
    http2 on;
    server_name live.dfchat.chat;

    ssl_certificate     /etc/letsencrypt/live/live.dfchat.chat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/live.dfchat.chat/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    # HLS players run inside the desktop client (Electron) — CORS open
    # is fine; viewers are authenticated by the signed URL, not origin.
    add_header Access-Control-Allow-Origin "*" always;

    # ----- HLS .m3u8 — verify + rewrite (no upstream roundtrip) -----
    # Capture the stream key (e.g. "abc123" or "abc123_ld") from
    # /hls/<key>.m3u8. The same key is passed to both the verifier
    # (signed in HMAC payload) and the rewriter (which reads
    # /var/www/hls/live/<key>.m3u8 from disk).
    location ~ ^/hls/(?<stream>[^/]+?)\.m3u8$ {
      js_content hls.m3u8;
    }

    # ----- HLS .ts segment — verify + serve from disk -----
    # SRS writes "<key>-<n>.ts" (e.g. abc123-7.ts). HMAC is signed
    # against the base stream key, not per-segment names — hls.ts
    # strips the "-<n>" suffix before verify, matching server01's
    # playAuth basename-strip on its side.
    location ~ ^/hls/(?<segfile>[^/]+?)\.ts$ {
      js_content hls.ts;
    }
    # Internal target hls.ts redirects to after verify. Serves the
    # file via sendfile() — fastest disk-to-socket path.
    location /_hls_file/ {
      internal;
      alias /var/www/hls/live/;
      add_header Cache-Control "public, max-age=10" always;
      add_header Access-Control-Allow-Origin "*" always;
    }

    # ----- Thumbnails for admin patrol + AI moderation -----
    # /thumbs/<stream_key>.jpg — 30 s-stale snapshots of the latest
    # broadcast frame, refreshed by the sweeper in the SRS container.
    # Intentionally not signed: thumbnails are by definition public
    # broadcast snapshots (everyone watching sees the same picture),
    # and the admin frontend needs them via plain <img> tags. The
    # filename is the stream_key which is non-guessable — gives us
    # de-facto enumeration resistance without the signed-URL cost.
    location /thumbs/ {
      alias /var/www/hls/thumbs/;
      add_header Cache-Control "no-store" always;
      add_header Access-Control-Allow-Origin "*" always;
      # Don't leak 403 vs 404; serve 404 for either.
      access_log off;
    }

    # ----- Health probe -----
    location = /healthz {
      access_log off;
      add_header Content-Type "text/plain" always;
      return 200 "live-edge ok\n";
    }

    # Anything else on this host: harmless plain response. Prevents
    # accidental scans from getting a directory index of /var/www/hls.
    location / { return 404 "not found\n"; }
  }
}
