# DFCHAT — SRS config (server02 edge node).
#
# Identical to server01's old srs.conf except:
#   - on_publish / on_unpublish / on_dvr now POST over the **public**
#     internet to https://app.dfchat.chat/api/v1/live/srs-hook/<secret>.
#     server01 nginx whitelists this server's public IP for that path.
#   - DVR remains OFF (matches server01 — recordings storage was killed
#     to avoid ~19 GB/wk fill rate). Turn it back on here and add the
#     mp4 upload-to-MinIO sidecar before re-enabling on the client.

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

stats {
    network         0;
}

vhost __defaultVhost__ {
    hls {
        enabled                 on;
        hls_path                ./objs/nginx/html;
        hls_fragment            2;
        hls_window              30;
        hls_cleanup             on;
        hls_dispose             120;
        # hls_ctx auto-rewrites m3u8 with a redirect on /live/... — our
        # nginx serves files directly from the data volume, so this
        # would break URL signing. Keep off (same as server01).
        hls_ctx                 off;
        hls_ts_ctx              off;
    }

    http_remux {
        enabled     on;
        mount       /live/[stream].flv;
    }

    # DVR off — re-enable only after wiring on_dvr → MinIO upload sidecar.
    dvr {
        enabled         off;
    }

    http_hooks {
        enabled         on;
        on_publish      ${LIVE_SRS_HOOK_URL};
        on_unpublish    ${LIVE_SRS_HOOK_URL};
        on_dvr          ${LIVE_SRS_HOOK_URL};
    }

    # 480p transcode DISABLED. Two bugs combined to keep it from ever
    # working in production:
    #   1. api on_publish hook 403s any stream key that doesn't match
    #      a DB row — so the transcoded "<key>_ld" stream was always
    #      rejected, meaning <key>_ld.m3u8 never existed on disk.
    #      Clients that requested it for "流畅 480p" got a hard 404.
    #   2. SRS treats <key>_ld as a freshly published stream and feeds
    #      it back into the transcode engine, generating <key>_ld_ld,
    #      <key>_ld_ld_ld, ... Each fails on_publish too, but the
    #      retry loop floods api with 403s every ~6s per recursion
    #      level, eating CPU and log space.
    #
    # To bring 480p back properly we need either:
    #   (a) accept "<key>_ld" hooks in api as a transcode side-effect
    #       (look up base key, validate, 200 without DB writes), AND
    #   (b) prevent the recursion via a separate vhost with transcode
    #       disabled for the _ld output.
    # Until then the client picker still offers 流畅 but it now silently
    # falls back to src (see Live.tsx — _ld.m3u8 404 triggers playback
    # with the original variant).
    # transcode { enabled on; ... }

    gop_cache       on;
    queue_length    10;
    tcp_nodelay     on;
    publish_1stpkt_timeout  20000;
    publish_normal_timeout  7000;
}
